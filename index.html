<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>讯安汇竞品雷达</title>
  <style>
    *{box-sizing:border-box}body{max-width:1080px;margin:52px auto;padding:0 24px;font:15px/1.7 -apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;color:#17324d;background:#f4f7fa}
    h1{font-size:30px;margin-bottom:6px}.note{color:#66788a;margin-bottom:24px}.guide{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px}.pill{background:#e7f1fa;color:#245b88;border:1px solid #cddfec;border-radius:999px;padding:6px 12px;font-size:13px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}.card{background:#fff;border:1px solid #dce6ef;border-radius:14px;padding:22px;box-shadow:0 8px 26px rgba(25,65,100,.06)}h2{font-size:18px;margin:0 0 14px}.item{padding:13px 0;border-top:1px solid #edf2f6}.item:first-of-type{border-top:0}.item a{color:#1769aa;text-decoration:none;font-weight:600}.meta{font-size:12px;color:#7a8b9c;margin-top:4px}.detail{font-size:12px;color:#53687a;margin-top:4px}.feed-link{display:inline-block;margin-top:12px;color:#60778c;font-size:13px}@media(max-width:760px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <h1>讯安汇竞品雷达</h1>
  <p class="note">每天看本页即可。有效线索在企业微信“自动发现待审核”中确认和归档。</p>
  <div class="guide"><span class="pill">官网与产品优先</span><span class="pill">平台价格仅作参考</span><span class="pill">信息不明确：需确认</span></div>
  <div class="grid" id="feeds"></div>
  <script>
    const feeds=[['competitors.xml','竞品官网、产品与海外品牌'],['market.xml','平台价格与配置']];
    const esc=s=>String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    Promise.all(feeds.map(async ([url,name])=>{
      const xml=await fetch(url,{cache:'no-store'}).then(r=>r.text());
      const doc=new DOMParser().parseFromString(xml,'application/xml');
      const all=[...doc.querySelectorAll('item')];
      return `<section class="card"><h2>${esc(name)} · ${all.length}条</h2>${all.slice(0,15).map(item=>{
        const title=item.querySelector('title')?.textContent||'';
        const link=item.querySelector('link')?.textContent||'#';
        const date=item.querySelector('pubDate')?.textContent||'';
        const raw=item.querySelector('description')?.textContent||'';
        const detail=raw.replace(/<br\s*\/?>/gi,' · ').replace(/<[^>]+>/g,'');
        return `<div class="item"><a href="${esc(link)}" target="_blank" rel="noopener">${esc(title)}</a><div class="detail">${esc(detail)}</div><div class="meta">${esc(date)}</div></div>`;
      }).join('')}<a class="feed-link" href="${url}">RSS订阅地址</a></section>`;
    })).then(cards=>document.querySelector('#feeds').innerHTML=cards.join('')).catch(()=>{
      document.querySelector('#feeds').textContent='内容加载失败，请稍后刷新。';
    });
  </script>
</body>
</html>
